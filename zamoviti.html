    <main class="order-section">
      <h1 class="order-title">Зробити замовлення</h1>
      <p class="order-subtitle">Заповніть форму нижче, і я зв'яжуся з вами найближчим часом!</p>

      <div class="form-container">
        <form action="#" method="POST" onsubmit="alert('Дякую за замовлення!'); return false;">
          
          <div class="form-group">
            <label for="name">Ваше ім'я:</label>
            <input type="text" id="name" name="name" placeholder="Введіть ваше ім'я" required />
          </div>

          <div class="form-group">
            <label for="email">E-mail для зв'язку:</label>
            <input type="email" id="email" name="email" placeholder="yourname@example.com" required />
          </div>

          <div class="form-group">
            <label for="service">Оберіть послугу:</label>
            <select id="service" name="service" required>
              <option disabled selected>-- Оберіть варіант --</option>
              <option>Калькулятор - 500грн</option>
              <option>Мессенджер - 10000грн</option>
              <option>Онлайн-Магазин - 8000грн</option>
              <option>Гра - 20000грн</option>
              <option>Інший серйозний проект - 1000000грн</option>
              <option>Інший не серйозний проект - 1грн</option>
            </select>
          </div>

          <div class="form-group">
            <label for="message">Деталі замовлення:</label>
            <textarea id="message" name="message" rows="5" placeholder="Опишіть ваше завдання або побажання..." required></textarea>
          </div>

          <button type="submit" class="form-submit-btn">Надіслати замовлення</button>

        </form>
      </div>
    </main>
