    <main class="order-section">
      <h1 class="order-title">Place an Order</h1>
      <p class="order-subtitle">Fill out the form below and I'll get back to you as soon as possible!</p>

      <div class="form-container">
        <form action="#" method="POST" onsubmit="alert('Thank you for your order!'); return false;">
          
          <div class="form-group">
            <label for="name">Your Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your name" required />
          </div>

          <div class="form-group">
            <label for="email">Contact E-mail:</label>
            <input type="email" id="email" name="email" placeholder="yourname@example.com" required />
          </div>

          <div class="form-group">
            <label for="service">Choose a Service:</label>
            <select id="service" name="service" required>
              <option disabled selected>-- Select an option --</option>
              <option>Calculator - $12</option>
              <option>Messenger - $220</option>
              <option>Online store - $180</option>
              <option>Game - $450</option>
              <option>Other serious project - $22,000</option>
              <option>Other not serious project - $1</option>
            </select>
          </div>

          <div class="form-group">
            <label for="message">Order Details:</label>
            <textarea id="message" name="message" rows="5" placeholder="Describe your task or requirements..." required></textarea>
          </div>

          <button type="submit" class="form-submit-btn">Submit Order</button>

        </form>
      </div>
    </main>
